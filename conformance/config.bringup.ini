; Bring-up config: validate Spike (DUT) against Sail (reference).
; No purv required. When every signature matches, the harness is proven.

[RISCOF]
ReferencePlugin=sail_cSim
ReferencePluginPath=./sail_cSim
DUTPlugin=spike
DUTPluginPath=./spike

[spike]
pluginpath=./spike
ispec=./spike/spike_isa.yaml
pspec=./spike/spike_platform.yaml
target_run=1

[sail_cSim]
pluginpath=./sail_cSim
